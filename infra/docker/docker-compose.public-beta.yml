name: vh-public-beta

services:
  origin:
    image: ${VH_PUBLIC_BETA_ORIGIN_IMAGE:?set rebuilt origin image tag or digest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8080"
      VH_PUBLIC_ORIGIN_FAIL_IF_MISSING_STATIC: "true"
      VH_PUBLIC_ORIGIN_ANALYSIS_TARGET: ${VH_PUBLIC_ORIGIN_ANALYSIS_TARGET:?set analysis backend URL}
      VH_PUBLIC_ORIGIN_RELAY_TARGETS: ${VH_PUBLIC_ORIGIN_RELAY_TARGETS:?set relay fanout targets}
      VH_PUBLIC_ORIGIN_CSP_CONNECT_SRC: ${VH_PUBLIC_ORIGIN_CSP_CONNECT_SRC:?set CSP connect-src}
      VH_PUBLIC_ORIGIN_RELAY_PROXY_TIMEOUT_MS: ${VH_PUBLIC_ORIGIN_RELAY_PROXY_TIMEOUT_MS:-10000}
      VH_PUBLIC_ORIGIN_RELAY_FANOUT_TIMEOUT_MS: ${VH_PUBLIC_ORIGIN_RELAY_FANOUT_TIMEOUT_MS:-30000}
      VH_PUBLIC_ORIGIN_RELAY_NEWS_FANOUT_TIMEOUT_MS: ${VH_PUBLIC_ORIGIN_RELAY_NEWS_FANOUT_TIMEOUT_MS:-60000}
    ports:
      - "${VH_PUBLIC_BETA_ORIGIN_PORT:-8080}:8080"
    networks:
      - public_beta

  relay-a:
    image: ${VH_PUBLIC_BETA_RELAY_IMAGE:?set rebuilt relay image tag or digest}
    restart: on-failure:5
    mem_limit: ${VH_PUBLIC_BETA_RELAY_MEMORY_LIMIT:-2304m}
    memswap_limit: ${VH_PUBLIC_BETA_RELAY_MEMORY_SWAP_LIMIT:-2304m}
    user: ${VH_PUBLIC_BETA_RELAY_UID_GID:?set relay UID:GID, for example humble uid:gid}
    env_file:
      - ${VH_PUBLIC_BETA_RELAY_ENV_FILE:?set relay env file outside git}
    environment:
      GUN_PORT: "7777"
      GUN_HOST: "0.0.0.0"
      GUN_FILE: /data
      GUN_RADISK: "true"
      NODE_ENV: production
      VH_RELAY_ID: public-beta-relay-a
      VH_RELAY_RESOURCE_WATCHDOG_ENABLED: ${VH_RELAY_RESOURCE_WATCHDOG_ENABLED:-true}
      VH_RELAY_RESOURCE_WATCHDOG_INTERVAL_MS: ${VH_RELAY_RESOURCE_WATCHDOG_INTERVAL_MS:-2000}
      VH_RELAY_WATCHDOG_MAX_HEAP_USED_BYTES: ${VH_RELAY_A_WATCHDOG_MAX_HEAP_USED_BYTES:-850000000}
      VH_RELAY_WATCHDOG_MAX_HEAP_GROWTH_BYTES: ${VH_RELAY_WATCHDOG_MAX_HEAP_GROWTH_BYTES:-150000000}
      VH_RELAY_WATCHDOG_MAX_RSS_GROWTH_BYTES: ${VH_RELAY_WATCHDOG_MAX_RSS_GROWTH_BYTES:-250000000}
      VH_RELAY_WATCHDOG_HEAP_SNAPSHOT_ENABLED: ${VH_RELAY_WATCHDOG_HEAP_SNAPSHOT_ENABLED:-true}
      VH_RELAY_WATCHDOG_EARLY_HEAP_SNAPSHOT_ENABLED: ${VH_RELAY_WATCHDOG_EARLY_HEAP_SNAPSHOT_ENABLED:-true}
      VH_RELAY_WATCHDOG_EARLY_HEAP_SNAPSHOT_HEAP_USED_BYTES: ${VH_RELAY_WATCHDOG_EARLY_HEAP_SNAPSHOT_HEAP_USED_BYTES:-800000000}
      VH_RELAY_WATCHDOG_EXIT_GRACE_MS: ${VH_RELAY_WATCHDOG_EXIT_GRACE_MS:-30000}
      VH_RELAY_DIAGNOSTIC_DIR: ${VH_RELAY_DIAGNOSTIC_DIR:-/data/diagnostics}
      VH_RELAY_STARTUP_JITTER_MAX_MS: ${VH_RELAY_STARTUP_JITTER_MAX_MS:-5000}
      VH_RELAY_CRITICAL_WRITE_READBACK_MAX_CONCURRENCY: ${VH_RELAY_CRITICAL_WRITE_READBACK_MAX_CONCURRENCY:-2}
      VH_RELAY_CRITICAL_WRITE_READBACK_QUEUE_LIMIT: ${VH_RELAY_CRITICAL_WRITE_READBACK_QUEUE_LIMIT:-16}
      VH_RELAY_CRITICAL_WRITE_READBACK_QUEUE_TIMEOUT_MS: ${VH_RELAY_CRITICAL_WRITE_READBACK_QUEUE_TIMEOUT_MS:-1000}
      VH_RELAY_NEWS_INDEX_SNAPSHOT_VERIFY_STORY_BODIES: ${VH_RELAY_NEWS_INDEX_SNAPSHOT_VERIFY_STORY_BODIES:-false}
      VH_RELAY_NEWS_INDEX_SNAPSHOT_REFRESH_STORY_STATES: ${VH_RELAY_NEWS_INDEX_SNAPSHOT_REFRESH_STORY_STATES:-false}
      VH_RELAY_NEWS_INDEX_SNAPSHOT_CACHE_MAX_ENTRIES: ${VH_RELAY_NEWS_INDEX_SNAPSHOT_CACHE_MAX_ENTRIES:-120}
      VH_RELAY_NEWS_INDEX_SNAPSHOT_STORY_BODY_CACHE_MAX_ENTRIES: ${VH_RELAY_NEWS_INDEX_SNAPSHOT_STORY_BODY_CACHE_MAX_ENTRIES:-120}
      VH_RELAY_GUN_GRAPH_SCAN_ENABLED: ${VH_RELAY_GUN_GRAPH_SCAN_ENABLED:-false}
      VH_RELAY_GUN_GRAPH_SCAN_INTERVAL_MS: ${VH_RELAY_GUN_GRAPH_SCAN_INTERVAL_MS:-60000}
      VH_RELAY_GUN_GRAPH_SCAN_BATCH_SIZE: ${VH_RELAY_GUN_GRAPH_SCAN_BATCH_SIZE:-1000}
      VH_RELAY_GUN_GRAPH_SCAN_MAX_SOULS: ${VH_RELAY_GUN_GRAPH_SCAN_MAX_SOULS:-250000}
      VH_RELAY_GUN_GRAPH_SCAN_MAX_DURATION_MS: ${VH_RELAY_GUN_GRAPH_SCAN_MAX_DURATION_MS:-5000}
      VH_RELAY_PEERS: ${VH_PUBLIC_BETA_RELAY_A_PEERS:?set relay-a peer list}
      VH_RELAY_PEER_AUTH_MODE: ${VH_RELAY_PEER_AUTH_MODE:-private_network_allowlist}
      VH_RELAY_PEER_ALLOWLIST: ${VH_RELAY_PEER_ALLOWLIST:-private}
    volumes:
      - type: bind
        source: ${VH_PUBLIC_BETA_RELAY_A_DATA_DIR:-/home/humble/.local/share/vhc/vhc-relay-a/data}
        target: /data
    ports:
      - "${VH_PUBLIC_BETA_RELAY_A_PORT:-7777}:7777"
    networks:
      - public_beta

