http:
  routers:
    attestation:
      rule: PathPrefix(`/api/attestation`)
      entryPoints:
        - web
      middlewares:
        - attestation-strip
      service: luma-verifier-dev-service
  middlewares:
    attestation-strip:
      stripPrefix:
        prefixes:
          - /api/attestation
  services:
    luma-verifier-dev-service:
      loadBalancer:
        servers:
          - url: http://luma-verifier-dev:3000
