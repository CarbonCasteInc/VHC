name: Public beta support request
description: Reach the VHC public beta support queue for support, deletion, copyright, abuse, or feedback.
title: "[Public beta support]: "
labels:
  - public-beta-support
body:
  - type: markdown
    attributes:
      value: |
        This creates a public GitHub issue in the VHC repository.

        Do not include private personal data, legal notices, identity documents, raw proof material, provider secrets, confidential support correspondence, or full copyrighted articles. If the issue requires private details, describe only the public-safe category and ask for an operator handoff.

        Deletion, copyright, abuse/safety, and account/access reports that need private details must use a public-safe issue stub. An operator will arrange private handoff outside this public GitHub issue; do not post the private details here.
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      description: Pick the closest public beta support category.
      options:
        - Account or access
        - Data deletion or correction
        - Abuse, safety, or moderation escalation
        - Copyright or attribution concern
        - Product feedback
        - Operational issue
    validations:
      required: true
  - type: textarea
    id: public_context
    attributes:
      label: Public-safe context
      description: Provide only public-safe ids, URLs, and a short triage summary. For sensitive cases, say that private handoff is needed.
      placeholder: Public topic/story/comment/report id, public URL, category, or short public-safe summary. Do not paste private details.
    validations:
      required: true
  - type: checkboxes
    id: safety_acknowledgement
    attributes:
      label: Public-record acknowledgement
      options:
        - label: I understand this issue is public and have not included private personal data, legal notices, secrets, raw proof material, confidential support correspondence, or full copyrighted articles.
          required: true
        - label: If private escalation is needed, I used only a public-safe issue stub and will wait for operator private handoff outside this public issue.
          required: true
