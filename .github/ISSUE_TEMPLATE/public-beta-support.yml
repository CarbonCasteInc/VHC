name: Public beta support request
description: Reach the VHC public beta support queue for support, deletion, copyright, abuse, or feedback.
title: "[Public beta support]: "
labels:
  - public-beta-support
body:
  - type: markdown
    attributes:
      value: |
        This creates a public GitHub issue in the VHC repository.

        Do not include private personal data, legal notices, identity documents, raw proof material, provider secrets, confidential support correspondence, or full copyrighted articles. If the issue requires private details, describe only the public-safe category and ask for an operator handoff.
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      description: Pick the closest public beta support category.
      options:
        - Account or access
        - Data deletion or correction
        - Abuse, safety, or moderation escalation
        - Copyright or attribution concern
        - Product feedback
        - Operational issue
    validations:
      required: true
  - type: textarea
    id: public_context
    attributes:
      label: Public-safe context
      description: Provide enough context for triage without posting private or confidential information.
      placeholder: Topic/story/comment/report id, public URL, or short public-safe summary.
    validations:
      required: true
  - type: checkboxes
    id: safety_acknowledgement
    attributes:
      label: Public-record acknowledgement
      options:
        - label: I understand this issue is public and have not included private personal data, legal notices, secrets, raw proof material, confidential support correspondence, or full copyrighted articles.
          required: true
