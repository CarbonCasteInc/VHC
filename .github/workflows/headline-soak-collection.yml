name: Headline Soak Collection

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

concurrency:
  group: headline-soak-collection
  cancel-in-progress: false

jobs:
  collect-headline-soak:
    name: Collect Headline Soak
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate collection prerequisites
        id: prerequisites
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            echo "can_collect=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "OPENAI_API_KEY secret is required for public semantic soak collection."
            exit 1
          fi

          echo "can_collect=false" >> "$GITHUB_OUTPUT"
          echo "Skipping scheduled headline soak collection because OPENAI_API_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Install pnpm
        if: steps.prerequisites.outputs.can_collect == 'true'
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20
        if: steps.prerequisites.outputs.can_collect == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        if: steps.prerequisites.outputs.can_collect == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        if: steps.prerequisites.outputs.can_collect == 'true'
        run: pnpm --filter @vh/e2e exec playwright install --with-deps

      - name: Collect Headline Soak Evidence
        if: steps.prerequisites.outputs.can_collect == 'true'
        run: pnpm collect:storycluster:headline-soak

      - name: Upload Headline Soak Artifacts
        if: always() && steps.prerequisites.outputs.can_collect == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daemon-feed-headline-soak
          path: |
            .tmp/daemon-feed-semantic-soak/**
            services/news-aggregator/.tmp/news-source-admission/latest/source-health-report.json
            services/news-aggregator/.tmp/news-source-admission/latest/source-health-trend.json
          if-no-files-found: error
          retention-days: 14
