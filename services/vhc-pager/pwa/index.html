<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>VHC A6 Pager</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(720px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
      }
      h1 {
        font-size: 28px;
        margin: 0;
      }
      p {
        margin: 0;
        line-height: 1.45;
      }
      button, input {
        font: inherit;
        min-height: 44px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #0f766e;
        color: white;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #94a3b8;
        border-radius: 8px;
        padding: 0 12px;
      }
      .panel {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 16px;
        display: grid;
        gap: 12px;
        background: white;
      }
      .muted {
        color: #475569;
        font-size: 14px;
      }
      .status {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        background: #0f172a;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 12px;
        min-height: 48px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #020617;
          color: #e5e7eb;
        }
        .panel {
          background: #111827;
          border-color: #334155;
        }
        .muted {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>VHC A6 Pager</h1>
        <p class="muted">This installs a public-safe pager surface on iPhone. iOS notification delivery still obeys Focus, silent mode, network availability, and Apple delivery behavior, so email fallback stays required.</p>
      </section>
      <section class="panel">
        <label>
          Device token
          <input id="deviceToken" type="password" autocomplete="off" placeholder="Paste the device token">
        </label>
        <label>
          Enrollment secret
          <input id="enrollmentSecret" type="password" autocomplete="off" placeholder="Paste the enrollment secret">
        </label>
        <button id="enable">Enable Notifications</button>
        <button id="health">Check Pager Health</button>
        <div id="status" class="status">Waiting.</div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
